services:
  postgres:
    image: postgres:16-alpine
    container_name: kotlinithub-postgres
    environment:
      POSTGRES_DB: kotlinithub
      POSTGRES_USER: kotlinithub
      POSTGRES_PASSWORD: kotlinithub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kotlinithub -d kotlinithub"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kotlinithub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: kotlinithub-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kotlinithub-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      JDBC_DATABASE_URL: jdbc:postgresql://postgres:5432/kotlinithub
      JDBC_DATABASE_USERNAME: kotlinithub
      JDBC_DATABASE_PASSWORD: kotlinithub
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: local-dev-secret
      BOOTSTRAP_ADMIN_EMAIL: admin@gmail.com
      BOOTSTRAP_ADMIN_PASSWORD: admin123
      BOOTSTRAP_ADMIN_NAME: Docker Admin
    ports:
      - "8080:8080"

volumes:
  postgres_data:
