spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:15432/second_brain_clean
    username: second_brain
    password: second_brain

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: INFO

openai:
  api-key: ${OPENAI_API_KEY:}
  embedding-model: text-embedding-3-small
  base-url: https://api.openai.com

app:
  jwt:
    secret: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    expiration-ms: 86400000